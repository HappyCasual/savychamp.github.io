<!DOCTYPE html>
<html>
<head>
    <title>Opening Jiggy Tiles...</title>
    <meta property="og:title" content="Jig Cards: Multi Art Jigsaw" />
    <meta property="og:description" content="Play the best jigsaw puzzle game!" />
    <script type="text/javascript">
        window.onload = function() {
            // The "Market" URI forces the Android App to open
            var playStoreUri = "market://details?id=com.happycasualcompany.jiggytiles";
            // Fallback for Desktop users
            var webUrl = "https://play.google.com/store/apps/details?id=com.happycasualcompany.jiggytiles";

            // Attempt to redirect to the app
            window.location.href = playStoreUri;

            // If the user is still on this page after 500ms (e.g. on a PC), go to the web store
            setTimeout(function() {
                window.location.href = webUrl;
            }, 500);
        };
    </script>
</head>
<body>
    <p style="text-align: center; margin-top: 50px; font-family: sans-serif;">
        Redirecting to the Play Store... <br>
        <a href="https://play.google.com/store/apps/details?id=com.happycasualcompany.jiggytiles">Click here if nothing happens.</a>
    </p>
</body>
</html>
